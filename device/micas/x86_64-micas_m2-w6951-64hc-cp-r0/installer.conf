ONIE_PLATFORM_EXTRA_CMDLINE_LINUX="modprobe.blacklist=ixgbe,wb_ixgbe,ice,i2c_designware_platform,wb_i2c_designware_platform,i2c_piix4,i2c_asf,spi_amd,cdc_subset"
CONSOLE_PORT=0x3f8
CONSOLE_DEV=0

create_eth_fix_rules(){
    [ -n "$demo_mnt" ] || return

    [ "$install_env" = "onie" -a -n "$demo_dev" ] && {
        mkdir -p $demo_mnt
        ${onie_bin} mount -t ext4 -o defaults,rw $demo_dev $demo_mnt || {
            echo "Error: Unable to mount $demo_dev on $demo_mnt,link creating failed."
        }
    }
    [ -n "$demo_mnt" -a -n "$image_dir" -a -d "$demo_mnt/$image_dir" ] && {
    mkdir -p $demo_mnt/$image_dir/rw/etc/systemd/network/

    # Fix Intel E610/E810 Ethernet interface names by PCI path
    # 02:00.0 -> eth1, 02:00.1 -> eth2 (E610 10GBASE-T)
    # 03:00.0..3 -> eth3..eth6 (E810-C backplane)
    for entry in \
        "1:0000:02:00.0" \
        "2:0000:02:00.1" \
        "3:0000:03:00.0" \
        "4:0000:03:00.1" \
        "5:0000:03:00.2" \
        "6:0000:03:00.3"; do
        idx=${entry%%:*}
        bdf=${entry#*:}
        cat > $demo_mnt/$image_dir/rw/etc/systemd/network/20-eth${idx}.link <<EOF
[Match]
Path=pci-${bdf}

[Link]
NamePolicy=
Name=eth${idx}
EOF
    done
    }
    [ "$install_env" = "onie" -a -n "$demo_dev" ] && umount $demo_mnt
}
trap_push "create_eth_fix_rules || true"
