# Configuration file version number.
# The current sap_bcm_81394.c does not read this field; it is compatibility/identification information.
# Modifying it will not affect the initialization process of the 81394 driver.
version=1

# ====================
# Global Initialization Parameters
# ====================

# Number of slots on the board.
# sap_aperta_config_init() first reads this value into the global g_slot_num,
# then sap_bcm_platform_init() calls sap_slot_init() for 0 to g_slot_num-1.
# Missing this field will cause configuration initialization to fail directly.
plp_slot_num=1

# MDIO access type. The ':1' in the key is not a PHY address, but the mdio_id.
# The code first reads plp_phy_mdio_id:0x30=1, then looks up plp_mdio_accs_type:1.
# The value comes from sap_mdio_type_e:
#   0 = MAC
#   1 = SYSFS
#   2 = SYSFS_CUST
# The current value 2 indicates using the custom sysfs MDIO access path.
plp_mdio_accs_type:1=2

# Firmware loading method, saved to the global g_fw_load_method.
# The definitions in the 81394 driver are:
#   0 = Do not load
#   1 = Unicast load
#   2 = Broadcast load
#   3 = EEPROM load
#   4 = upgrade path
#   5 = skip
#   6 = full process
# The current value 1 means downloading firmware to each PHY via unicast.
plp_fw_load_method=1

# Enable or disable I2C slave.
# The code reads this into g_i2c_slave_en, but in the current main flow of the 81394,
# the corresponding register write logic is completely commented out.
# Therefore, this value is currently a "parsed but not effective by default" field.
plp_i2c_slave_en=0

# AVS I2C response address.
# This is also read into g_avs_i2c_resp_addr and used by sap_bcm_avs_init() to assemble register values.
# However, AVS initialization is not actually enabled in the current boot path, so this is just a reserved configuration.
avs_i2c_resp_addr=0x35

# Default enable/disable link training for the port's system side.
# If there is no per-port configuration for init_linktrain_sys, each port inherits this global value.
# In sap_aperta_post_port_init(), it calls sap_bcm_linktraining_set(..., true) only if the value is 1.
# 0 means do not automatically enable LT.
plp_port_linktrain_sys=0

# Default enable/disable link training for the port's line side.
# The semantics are the same as plp_port_linktrain_sys, applying to the line side.
plp_port_linktrain_line=0

# ====================
# Profile 1 VCO Presets
# ====================

# VCO selection for Profile 1, octal 0, system side.
# The 81394 code forcibly reads this and saves it to phy_info->vco_octal_0_sys.
# Confirmed from public headers:
#   0 = bcmplpVco51G
#   1 = bcmplpVco53G
# The current value 1 means 53G VCO.
# Note: In this version of the 81394 implementation, this value is read but not used further in mode_config_set.
# It seems more like a field retained to share the configuration format with other chips in the family.
plp_profile_1_init_vco_octal_0_sys=1

# VCO selection for Profile 1, octal 0, line side.
# The current value 1 = 53G VCO.
plp_profile_1_init_vco_octal_0_line=1

# VCO selection for Profile 1, octal 1, system side.
# The current board type uses only one PHY at address 0x30 and the profile uses lanes=0,1,
# but the code still requires the VCO for octal 1 to be configured, otherwise configuration parsing fails.
plp_profile_1_init_vco_octal_1_sys=1

# VCO selection for Profile 1, octal 1, line side.
# The current value 1 = 53G VCO.
plp_profile_1_init_vco_octal_1_line=1

# ====================
# Profile 1: 100G, split=1, Single port with 4 lanes
# Key format: plp_profile_<profile>_speed_<speed>_split_<split_num>.<port_id>:<subkey>
# This is changed to a single 100G port, hence split_num=1, port_id=0.
#
# In the 81394 code, split_num is not hardcoded, but calculated by:
#   phy_info->lane_num / port_info->lanes
# Therefore, to target split_1.0, the init_lanes below needs to provide 4 lane entries,
# and init_ports_lane_num must be configured as 4, indicating a 4-lane aggregated port.
# ====================

# FEC mode for the line side.
# For the 100G 4x25G scenario, the semantics from the original file are retained, where 3 = RSFEC.
# This still uses the 25.78125G/lane NRZ path, not 2x50G PAM4.
plp_profile_1_speed_100000_split_1.0:fec_line=3

# FEC mode for the system side.
# Consistent with the line side, configured as 3 = RSFEC.
plp_profile_1_speed_100000_split_1.0:fec_sys=3

# Interface type for the line side.
# In bcm_pm_interface_t, 7 = bcm_pm_InterfaceKR4.
# This is changed from the single-lane KR to 4-lane KR4, matching the 100G 4-lane port form factor.
plp_profile_1_speed_100000_split_1.0:iftype_line=7

# Interface type for the system side.
# Also changed to 7 = KR4, maintaining the lane count and interface width consistency between system/line sides.
plp_profile_1_speed_100000_split_1.0:iftype_sys=7

# Line side lane bitmask.
# 0xF = 0000 1111b, indicating selection of 4 consecutive lanes.
# With speed=100000, the code calculates the per-lane speed as 25.78125G.
plp_profile_1_speed_100000_split_1.0:lanemap_line=0xF

# System side lane bitmask.
# Same as the line side, indicating a 4-lane passthrough port, not a gearbox/reverse-gearbox.
plp_profile_1_speed_100000_split_1.0:lanemap_sys=0xF

# Force NR (No Retimer) bitmap for the system side.
# Currently not forced, keep as 0.
plp_profile_1_speed_100000_split_1.0:force_nr_sys=0x0

# Force NR (No Retimer) bitmap for the line side.
# Currently not forced, keep as 0.
plp_profile_1_speed_100000_split_1.0:force_nr_line=0x0

# Force ER (Eye Retimer) bitmap for the system side.
# Currently not forced, keep as 0.
plp_profile_1_speed_100000_split_1.0:force_er_sys=0x0

# Force ER (Eye Retimer) bitmap for the line side.
# Currently not forced, keep as 0.
plp_profile_1_speed_100000_split_1.0:force_er_line=0x0


# ====================
# PHY List
# ====================

# List of PHY addresses to initialize.
# sap_aperta_config_init() generates g_bcm_phy_infos based on this array.
# Currently, there is only one PHY at address 0x30.
plp_phy_addrs=0x30

# ====================
# PHY 0x30 Base Attributes
# PHY address resolution method:
#    bus_id = (phy_addr & 0x7c00)>>10;
#    mdio_index = (phy_addr & 0x3e0)>>5;
#    phy_addr = phy_addr & 0x1f;
#    return dfd_utest_mdiodev_rd(mdio_index+bus_id, phy_addr, reg_addr, data);
# ====================

# The unit to which the PHY is bound.
# sap_slot_init() filters by unit and card_id to determine if this PHY should be initialized in the current round.
plp_phy_unit_id:0x30=0

# The card/slot number the PHY belongs to.
# The PHY is initialized only when this matches the outer slot_id.
plp_phy_card_id:0x30=0

# The mdio_id used by this PHY.
# The code will then use this mdio_id to look up plp_mdio_accs_type:<mdio_id>.
plp_phy_mdio_id:0x30=1

# PHY chip name.
# For this version of the 81394 code, this is a compatibility field, as the chip_name is hardcoded to "aperta" in the source.
# Modifying it will not change the chip name used by the driver.
plp_phy_chip_name:0x30=aperta

# MACsec option.
# The current 81394 file only reads and saves this to phy_info->macsec_option, with no subsequent use observed.
# Therefore, this is more of a reserved field.
plp_phy_macsec_option:0x30=0x0

# PTP option.
# Similar to macsec_option, currently only parsed and saved, not consumed in the main 81394 flow.
plp_phy_ptp_option:0x30=0x0

# The initialization profile ID used by this PHY.
# The '1' in all subsequent plp_profile_1_* key names is determined by this value.
plp_phy_init_profile_id:0x30=1

# The lane list for this PHY under Profile 1.
# This is changed to 0,1,2,3. This does not mean 4 independent logical ports,
# but rather to make phy_info->lane_num = 4, causing the code to calculate split_num = 1.
# The number of logical ports actually created is still determined by the next line, init_ports.
plp_profile_1_init_lanes:0x30=0-3

# The list of logical port numbers presented externally by this PHY under Profile 1.
# Changed to create only one logical port, port 1, to carry the 1x100G module.
plp_profile_1_init_ports:0x30=1

# The number of lanes occupied by each logical port under Profile 1.
# Changed to a single port occupying 4 lanes.
plp_profile_1_init_ports_lane_num:0x30=4

# The initial speed of each logical port under Profile 1.
# Changed to 100000 Mbps for a single port, i.e., 100G.
plp_profile_1_init_speed_mode:0x30=100000

# ====================
# PHY 0x30 Global Lane Swap and Polarity Configuration
# These keys apply to the entire PHY, not a single port.
# ====================

# System side TX lane mapping.
# This value is parsed as 8 nibbles, lane by lane.
# lane_map_tx[lane_index] = GET_LANE_SWAP_OCTAL(value, lane_index).
# 0x76543210 represents logical 0->0, 1->1, 2->2... 7->7, which is an identity mapping.
plp_phy_tx_lane_map_sys:0x30=0x76543210

# System side RX lane mapping.
# Currently also an identity mapping.
plp_phy_rx_lane_map_sys:0x30=0x76543210

# Line side TX lane mapping.
# 0x76543120 indicates a lane swap on the line side, no longer a direct passthrough.
# The code calls bcm_plp_rxtx_laneswap_set() in sap_aperta_phy_init() to apply this.
plp_phy_tx_lane_map_line:0x30=0x76542301

# Line side RX lane mapping.
# Currently the same as TX, indicating that RX/TX both follow the same line-side swapping rules.
plp_phy_rx_lane_map_line:0x30=0x76542301

# Line side TX polarity flip bitmap.
# In sap_aperta_phy_init(), the current polarity is read, XORed with this value, and then written back.
# Therefore, a bit=1 means flip the polarity for the corresponding lane; 0 means leave it unchanged.
# The current 0x0 means no polarity flip on the line side TX.
plp_tx_polarity_flip_line:0x30=0x0

# Line side RX polarity flip bitmap.
# The current 0x0 means no polarity flip on the line side RX.
plp_rx_polarity_flip_line:0x30=0xF

# System side TX polarity flip bitmap.
# The current 0x0 means no polarity flip on the system side TX.
plp_tx_polarity_flip_sys:0x30=0x0

# System side RX polarity flip bitmap.
# The current 0x0 means no polarity flip on the system side RX.
plp_rx_polarity_flip_sys:0x30=0x0
