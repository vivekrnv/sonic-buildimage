# Configuration item: temperature hwmon path
# Format: hwmon_temp[key1]_[key2]
# Note: key1: High 8bit indicates the index of the device, starting from 1; low 8bit indicates the temperature index, starting from 1
# key2: The high 4bit indicates the primary device type, the sub-card is 5, and the low 4bit indicates the temperature type 0:input 1:alias
# 2:type 3:max 4:max_hyst 5:min 6:crit
# mode: str_constant takes the value of str_cons directly and config reads it in the way specified by src
# int_cons:N Original value /(10^N)
# fpath: indicates the first half of the hwmon path
# bit_offset: specifies the number of decimal places. If not configured, the original precision is retained
# str_cons: when mode is str_constant, its value is the result of reading, and when reading from a file, the name of the file being read

