# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
# Build and push sonic-mgmt image

schedules:
- cron: "0 8 * * *"
  branches:
    include:
    - master
  always: true

trigger: none
pr:
  branches:
    include:
    - master
  paths:
    include:
    - dockers/docker-sonic-mgmt

resources:
  repositories:
  - repository: sonic-mgmt
    type: github
    name: sonic-net/sonic-mgmt
    ref: master
    endpoint: sonic-net

parameters:
- name: registry_url
  type: string
  default: sonicdev-microsoft.azurecr.io
- name: registry_conn
  type: string
  default: sonicdev

stages:
- stage: Build
  jobs:
  - job: Build
    pool: sonicso1ES-amd64
    timeoutInMinutes: 360
    steps:
    - template: cleanup.yml
    - checkout: self
      clean: true
    - script: |
        set -x
        sudo setfacl -R -b $(Agent.BuildDirectory)
      displayName: 'setfacl'

    - bash: |
        set -xe
        git submodule update --init --recursive -- src/sonic-platform-daemons src/sonic-genl-packet src/sonic-sairedis src/ptf src/sonic-device-data src/sonic-dash-api

        make NOBUSTER=1 NOBULLSEYE=1 SONIC_BUILD_JOBS=$(nproc) DEFAULT_CONTAINER_REGISTRY=publicmirror.azurecr.io ENABLE_DOCKER_BASE_PULL=y ENABLE_SBOM=y configure PLATFORM=generic DOCKER_BUILDKIT=0
        make -f Makefile.work BLDENV=bookworm SONIC_BUILD_JOBS=$(nproc) DEFAULT_CONTAINER_REGISTRY=publicmirror.azurecr.io ENABLE_DOCKER_BASE_PULL=y ENABLE_SBOM=y target/docker-sonic-mgmt.gz
        cp -r target $(Build.ArtifactStagingDirectory)/target
      env:
        REGISTRY_SERVER: ${{ parameters.registry_url }}
      displayName: Build docker-sonic-mgmt.gz

    - publish:  $(Build.ArtifactStagingDirectory)
      artifact: 'docker-sonic-mgmt'
      displayName: "Archive docker image sonic-mgmt"

    - bash: |
        set -ex
        docker load -i $(Build.ArtifactStagingDirectory)/target/docker-sonic-mgmt.gz
        docker tag docker-sonic-mgmt:latest $REGISTRY_SERVER/docker-sonic-mgmt:lastbuild
        docker images
      env:
        REGISTRY_SERVER: ${{ parameters.registry_url }}
      displayName: 'Load and tag docker-sonic-mgmt as lastbuild'

    - task: Docker@2
      displayName: 'Push docker-sonic-mgmt:lastbuild to registry'
      condition: succeeded()
      inputs:
        containerRegistry: ${{ parameters.registry_conn }}
        repository: docker-sonic-mgmt
        command: push
        tags: lastbuild

- stage: Test
  dependsOn: Build
  condition: and(succeeded(), in(dependencies.Build.result, 'Succeeded'))
  variables:
  - group: SONiC-Elastictest
  - name: BUILD_BRANCH
    value: $(Build.SourceBranchName)
  jobs:
  - job: sbom_vuln_scan
    displayName: "[OPTIONAL] SBOM-based vulnerability scan (docker-sonic-mgmt)"
    # Disabled for now; remove this `condition: false` (or change to
    # `and(succeeded(), in(dependencies.Build.result, 'Succeeded'))`)
    # to re-enable the docker-sonic-mgmt SBOM vulnerability scan.
    # The SBOM itself is still produced by the Build stage above
    # when ENABLE_SBOM=y; only the post-build scan is gated.
    condition: false
    pool: sonic-ubuntu-1c
    continueOnError: true
    timeoutInMinutes: 30
    steps:
    - checkout: self
      clean: true
      fetchDepth: 1
    - download: current
      artifact: docker-sonic-mgmt
      displayName: "Download docker-sonic-mgmt artifact (includes SBOM)"
    - script: |
        set -ex
        sudo apt-get install -y python3-pip jq
      displayName: "Install dependencies"
    - script: |
        set -x
        SBOM=$(Pipeline.Workspace)/docker-sonic-mgmt/target/docker-sonic-mgmt.gz.sbom.cdx.json
        if [ ! -f "$SBOM" ]; then
          echo "::error::SBOM not found at $SBOM — was the build invoked with ENABLE_SBOM=y?"
          ls -la $(Pipeline.Workspace)/docker-sonic-mgmt/target/ | head -30
          exit 1
        fi
        echo "SBOM: $SBOM"
        echo "Component count: $(jq '.components | length' "$SBOM")"
      displayName: "Verify SBOM artifact is present"
    - script: |
        set -x
        # Mirror the prior trivy policy: report MEDIUM/HIGH/CRITICAL,
        # filter to fixed CVEs only, fail the job on any unsuppressed
        # finding. VEX statements under vex/ are applied first.
        REPORT=$(Build.ArtifactStagingDirectory)/sbom-vuln-sonic-mgmt
        python3 scripts/sbom_vuln_scan.py \
          --vex vex \
          --min-severity medium \
          --fail-on medium \
          --format both \
          --output "${REPORT}.cdx.json" \
          $(Pipeline.Workspace)/docker-sonic-mgmt/target/docker-sonic-mgmt.gz.sbom.cdx.json \
          | tee "${REPORT}.txt"
        EXIT=${PIPESTATUS[0]}
        echo ""
        echo "=== SBOM vulnerability scan results (docker-sonic-mgmt) ==="
        echo "Full CycloneDX VEX report: ${REPORT}.cdx.json"
        echo "Human-readable table:      ${REPORT}.txt"
        exit $EXIT
      displayName: "SBOM vulnerability scan (docker-sonic-mgmt)"
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: sbom-vuln-scan-results
      displayName: "Publish SBOM vuln-scan results"
      condition: always()
      continueOnError: true

  - template: .azure-pipelines/pr_test_template.yml@sonic-mgmt
    parameters:
      CHECKOUT_SONIC_MGMT: true
      # todo: enable vpp build in sonic-mgmt docker image build pipeline, and add vpp test pipeline back.
      INCLUDE_JOBS: "all"
      OVERRIDE_PARAMS:
        REPO_NAME: "sonic-mgmt"
        SETUP_CONTAINER_PARAMS: "-i ${{ parameters.registry_url }}/docker-sonic-mgmt:lastbuild"

- stage: Publish
  dependsOn: Test
  condition: and(not(canceled()), in(dependencies.Test.result, 'Succeeded', 'SucceededWithIssues'))
  jobs:
  - job: PublishAsLatest
    pool: sonicso1ES-amd64
    timeoutInMinutes: 60
    steps:
    - download: current
      artifact: 'docker-sonic-mgmt'
      displayName: "Download docker-sonic-mgmt image"

    - bash: |
        set -ex
        docker load -i $(Pipeline.Workspace)/docker-sonic-mgmt/target/docker-sonic-mgmt.gz
        docker tag docker-sonic-mgmt:latest $REGISTRY_SERVER/docker-sonic-mgmt:latest
        docker images
      env:
        REGISTRY_SERVER: ${{ parameters.registry_url }}
      displayName: 'Load and tag docker-sonic-mgmt as latest'

    - task: Docker@2
      displayName: 'Push docker-sonic-mgmt:latest to registry'
      condition: succeeded()
      inputs:
        containerRegistry: ${{ parameters.registry_conn }}
        repository: docker-sonic-mgmt
        command: push
        tags: latest
